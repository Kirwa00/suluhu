name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: suluhu
          POSTGRES_PASSWORD: suluhu_dev_password
          POSTGRES_DB: suluhu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suluhu"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://suluhu:suluhu_dev_password@localhost:5432/suluhu_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret-32
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret-32
      PHI_ENCRYPTION_KEY: Y2ktdGVzdC1waGkta2V5LTMyLWJ5dGVzLWxvbmchIQ==
      PROVIDER_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run migrations
        run: npm run db:migrate

      - name: Unit & integration tests
        run: npm run test

      - name: Build
        run: npm run build
