<body class="font-body-md text-on-surface antialiased">
<!-- Header: TopAppBar (Sub-page Variant) -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface h-16 flex items-center px-4 shadow-sm">
<div class="flex items-center w-full">
<button class="mr-4 p-2 hover:bg-surface-variant rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline-md text-headline-md text-primary leading-tight">Resolve Clinical Alert</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant">Mercy Wanjiku • SLH-882</p>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="pt-20 pb-40 px-4 max-w-lg mx-auto">
<!-- Info Card -->
<div class="bg-surface-container-low rounded-xl p-4 mb-8 border border-outline-variant/30 flex items-start gap-4">
<div class="p-2 bg-error-container text-on-error-container rounded-lg">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div>
<h2 class="font-label-md text-label-md text-on-surface font-bold">High Risk Alert</h2>
<p class="font-body-md text-label-sm text-on-surface-variant mt-1">Pending resolution since Oct 24, 09:12 AM. Please complete all clinical safety checks before proceeding.</p>
</div>
</div>
<!-- Workflow Form -->
<form class="space-y-8">
<!-- 1. Resolution Summary -->
<section class="space-y-3">
<label class="block font-label-md text-label-md text-on-surface font-semibold" for="summary">
          Resolution Summary
        </label>
<textarea class="w-full bg-surface-soothing border-none rounded-xl focus:ring-2 focus:ring-tertiary p-4 text-on-surface placeholder:text-outline transition-all" id="summary" placeholder="Document the clinical rationale for resolving this alert... e.g., 'Safety plan confirmed, patient stabilized through intervention.'" rows="5"></textarea>
</section>
<!-- 2. Outcome Category -->
<section class="space-y-3">
<label class="block font-label-md text-label-md text-on-surface font-semibold">
          Outcome Category
        </label>
<div class="grid grid-cols-1 gap-2">
<!-- Selection Cards -->
<label class="relative flex items-center p-4 rounded-xl border border-outline-variant hover:bg-surface-container transition-all cursor-pointer group">
<input checked="" class="hidden peer" name="outcome" type="radio" value="stabilized"/>
<div class="flex flex-col">
<span class="font-label-md text-on-surface">Stabilized</span>
<span class="text-label-sm text-on-surface-variant">Immediate threat resolved, patient calm.</span>
</div>
<div class="ml-auto opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined">check_circle</span>
</div>
<div class="absolute inset-0 rounded-xl border-2 border-primary opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
<label class="relative flex items-center p-4 rounded-xl border border-outline-variant hover:bg-surface-container transition-all cursor-pointer group">
<input class="hidden peer" name="outcome" type="radio" value="referred"/>
<div class="flex flex-col">
<span class="font-label-md text-on-surface">Referred to Specialist</span>
<span class="text-label-sm text-on-surface-variant">Handover to secondary care facility.</span>
</div>
<div class="ml-auto opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined">check_circle</span>
</div>
<div class="absolute inset-0 rounded-xl border-2 border-primary opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
<label class="relative flex items-center p-4 rounded-xl border border-outline-variant hover:bg-surface-container transition-all cursor-pointer group">
<input class="hidden peer" name="outcome" type="radio" value="observation"/>
<div class="flex flex-col">
<span class="font-label-md text-on-surface">Observation Complete</span>
<span class="text-label-sm text-on-surface-variant">Monitoring period ended without incident.</span>
</div>
<div class="ml-auto opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined">check_circle</span>
</div>
<div class="absolute inset-0 rounded-xl border-2 border-primary opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
</div>
</section>
<!-- 4. Supervisor Sign-off (Toggle) -->
<section class="bg-surface-container-high/40 p-4 rounded-xl flex items-center justify-between border border-outline-variant/30">
<div class="flex items-center gap-3">
<div class="p-2 bg-tertiary/10 rounded-lg">
<span class="material-symbols-outlined text-tertiary">verified_user</span>
</div>
<div>
<h3 class="font-label-md text-on-surface font-semibold">Supervisor Review</h3>
<p class="text-label-sm text-on-surface-variant">Clinical lead has reviewed this case.</p>
</div>
</div>
<button class="w-11 h-6 bg-outline-variant rounded-full p-0.5 transition-colors duration-200 relative" onclick="this.classList.toggle('bg-primary'); this.querySelector('div').classList.toggle('translate-x-5')" type="button">
<div class="w-5 h-5 bg-white rounded-full transition-transform duration-200 shadow-sm"></div>
</button>
</section>
<!-- 3. Final Safety Verification -->
<section class="mt-4 p-4 bg-accent-teal-light rounded-xl border border-secondary/20">
<label class="flex items-start gap-3 cursor-pointer">
<div class="mt-1">
<input class="w-5 h-5 rounded text-primary border-outline focus:ring-primary transition-all" required="" type="checkbox"/>
</div>
<span class="font-body-md text-label-md text-secondary leading-snug">
            I confirm that the <strong>clinical safety protocol</strong> has been completed and the patient is no longer at immediate risk.
          </span>
</label>
</section>
</form>
</main>
<!-- Sticky Footer: Primary Actions -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-bright px-4 py-6 border-t border-outline-variant/20 shadow-lg safe-area-bottom">
<div class="flex flex-col gap-3 max-w-lg mx-auto">
<button class="w-full h-14 bg-primary-container text-white font-headline-md text-headline-md rounded-xl shadow-sm active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">done_all</span>
        Confirm Resolution
      </button>
<button class="w-full h-12 text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant rounded-xl transition-colors">
        Cancel &amp; Return to Details
      </button>
</div>
</footer>
<!-- Light Atmospheric Animation (Micro-interaction Background) -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-40">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
