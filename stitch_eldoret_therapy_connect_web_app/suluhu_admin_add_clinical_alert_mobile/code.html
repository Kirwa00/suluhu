<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Suluhu Admin - Add Clinical Alert</title>

                    "on-error": "#ffffff",

                    "surface-container": "#eceeef",

                    "text-rich-slate": "#1C1E21",
                    "surface-variant": "#e1e3e4",
                    "primary-fixed-dim": "#a7c8ff",
                    "accent-teal-light": "#E8F3F1",
                    "surface-soothing": "#F0F4F8",
                    "surface": "#f8fafb",
                    "outline": "#737781",
                    "error-container": "#ffdad6",
                    "secondary": "#166a59",
                    "secondary-fixed-dim": "#89d5c0",
                    "tertiary-fixed": "#c1e8ff",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#81d0f8",
                    "on-tertiary-container": "#7acaf2",
                    "on-tertiary-fixed": "#001e2b",
                    "secondary-fixed": "#a5f2db",
                    "on-secondary-fixed-variant": "#005142",
                    "surface-tint": "#305f9d",
                    "surface-dim": "#d8dadb",
                    "error": "#ba1a1a",
                    "inverse-primary": "#a7c8ff",
                    "on-primary": "#ffffff",
                    "on-background": "#191c1d",
                    "inverse-on-surface": "#eff1f2",
                    "outline-variant": "#c2c6d1",
                    "surface-container-low": "#f2f4f5",
                    "on-primary-fixed-variant": "#0d4784",
                    "success-calm": "#2E8555",
                    "on-primary-fixed": "#001c3b",
                    "inverse-surface": "#2e3132",
                    "on-tertiary": "#ffffff",
                    "tertiary": "#003d52",
                    "surface-bright": "#f8fafb",
                    "on-surface": "#191c1d",
                    "on-secondary-container": "#1f705f",
                    "on-surface-variant": "#424750",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e1e3e4",
                    "surface-container-high": "#e6e8e9",
                    "primary": "#00386d",
                    "tertiary-container": "#005571"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-gap": "80px",
                    "margin-mobile": "16px",
                    "gutter": "24px",
                    "container-max": "1200px",
                    "unit": "8px",
                    "margin-desktop": "40px"
            },
            "fontFamily": {

                    "body-lg": ["Inter"],

            },
            "fontSize": {

                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],

                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-focus-ring:focus {
            outline: 2px solid #2E86AB;
            outline-offset: 0;
            border-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md text-body-md flex flex-col min-h-screen">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface-container-low border-b border-outline-variant shadow-none">
<div class="flex items-center gap-3">
<button aria-label="Back" class="p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Add Clinical Alert</h1>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-xs uppercase" title="Admin profile">
                AD
            </div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 pt-20 pb-24 px-margin-mobile max-w-lg mx-auto w-full">
<!-- Patient Context Card -->
<section class="mb-6">
<div class="bg-surface-container-lowest rounded-xl p-4 border border-outline-variant shadow-sm flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-accent-teal-light flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div>
<h2 class="font-headline-md text-[18px] text-text-rich-slate leading-tight">Mercy Wanjiku</h2>
<p class="font-label-md text-on-surface-variant">ID: SLH-882</p>
</div>
<div class="ml-auto">
<span class="px-2 py-1 bg-surface-container-high rounded text-label-sm text-on-surface-variant font-medium uppercase tracking-wider">In-Patient</span>
</div>
</div>
</section>
<!-- Form Section -->
<form class="space-y-6" id="clinicalAlertForm">
<!-- Urgency Level -->
<div class="space-y-3">
<label class="block font-label-md text-on-surface-variant">Urgency Level</label>
<div class="grid grid-cols-3 gap-2">
<button class="urgency-btn flex flex-col items-center justify-center p-3 rounded-xl border-2 border-outline-variant bg-surface-container-low transition-all active:scale-95" onclick="selectUrgency('high', this)" type="button">
<span class="material-symbols-outlined mb-1 text-error">priority_high</span>
<span class="font-label-sm">High</span>
</button>
<button class="urgency-btn flex flex-col items-center justify-center p-3 rounded-xl border-2 border-outline-variant bg-surface-container-low transition-all active:scale-95" onclick="selectUrgency('medium', this)" type="button">
<span class="material-symbols-outlined mb-1 text-primary">warning</span>
<span class="font-label-sm">Medium</span>
</button>
<button class="urgency-btn flex flex-col items-center justify-center p-3 rounded-xl border-2 border-outline-variant bg-surface-container-low transition-all active:scale-95" onclick="selectUrgency('low', this)" type="button">
<span class="material-symbols-outlined mb-1 text-secondary">info</span>
<span class="font-label-sm">Low</span>
</button>
</div>
</div>
<!-- Alert Category -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface-variant" for="category">Alert Category</label>
<div class="relative">
<select class="w-full bg-surface-soothing border-none rounded-xl py-4 px-4 text-body-md form-focus-ring appearance-none" id="category">
<option disabled="" selected="" value="">Select category...</option>
<option value="self-harm">Risk of Self-Harm</option>
<option value="anxiety">Severe Anxiety</option>
<option value="medication">Medication Side Effect</option>
<option value="behavioral">Behavioral Changes</option>
<option value="crisis">Acute Crisis</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<!-- Alert Title -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface-variant" for="title">Alert Title</label>
<input class="w-full bg-surface-soothing border-none rounded-xl py-4 px-4 text-body-md form-focus-ring" id="title" placeholder="e.g., Recent Suicidal Ideation" type="text"/>
</div>
<!-- Detailed Description -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface-variant" for="description">Detailed Description</label>
<textarea class="w-full bg-surface-soothing border-none rounded-xl py-4 px-4 text-body-md form-focus-ring resize-none custom-scrollbar" id="description" placeholder="Enter clinical notes and observations here..." rows="4"></textarea>
</div>
<!-- Immediate Actions Taken -->
<div class="space-y-3">
<label class="block font-label-md text-on-surface-variant">Immediate Actions Taken</label>
<div class="space-y-2">
<label class="flex items-center gap-3 p-4 rounded-xl bg-surface-container-low border border-outline-variant cursor-pointer active:bg-surface-variant transition-colors">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary-container" type="checkbox"/>
<span class="font-body-md">Emergency Contact Notified</span>
</label>
<label class="flex items-center gap-3 p-4 rounded-xl bg-surface-container-low border border-outline-variant cursor-pointer active:bg-surface-variant transition-colors">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary-container" type="checkbox"/>
<span class="font-body-md">Safety Plan Reviewed</span>
</label>
<label class="flex items-center gap-3 p-4 rounded-xl bg-surface-container-low border border-outline-variant cursor-pointer active:bg-surface-variant transition-colors">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary-container" type="checkbox"/>
<span class="font-body-md">Clinic Manager Alerted</span>
</label>
</div>
</div>
</form>
</main>
<!-- Bottom Action Bar (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface p-4 border-t border-outline-variant z-50">
<button class="w-full bg-primary-container text-white py-4 rounded-xl font-bold text-body-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" form="clinicalAlertForm" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">notification_important</span>
            Save &amp; Trigger Alert
        </button>
</div>
<!-- Micro-interaction Scripts -->
<script>
        function selectUrgency(level, element) {
            // Reset all buttons
            document.querySelectorAll('.urgency-btn').forEach(btn => {
                btn.classList.remove('bg-error-container', 'border-error', 'text-on-error-container', 'bg-primary-fixed', 'border-primary', 'bg-secondary-container', 'border-secondary', 'shadow-sm');
                btn.classList.add('bg-surface-container-low', 'border-outline-variant');
            });

            // Set active state
            element.classList.remove('bg-surface-container-low', 'border-outline-variant');
            element.classList.add('shadow-sm');
            
            if (level === 'high') {
                element.classList.add('bg-error-container', 'border-error', 'text-on-error-container');
            } else if (level === 'medium') {
                element.classList.add('bg-primary-fixed', 'border-primary');
            } else if (level === 'low') {
                element.classList.add('bg-secondary-container', 'border-secondary');
            }
        }

        // Initialize with Medium urgency by default
        window.onload = () => {
            const mediumBtn = document.querySelectorAll('.urgency-btn')[1];
            selectUrgency('medium', mediumBtn);
        };

        // Success handling simulation
        document.getElementById('clinicalAlertForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Processing...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Alert Published';
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-success-calm');
            }, 1500);
        });
    </script>
</body></html>
