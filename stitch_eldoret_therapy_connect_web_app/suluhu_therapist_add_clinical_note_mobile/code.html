    body {

<body class="bg-surface font-body-md text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface dark:bg-surface-dim">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-150 p-2 hover:bg-primary-container/10 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim">Clinical Session</h1>
</div>
<button class="active:scale-95 transition-transform duration-150 p-2 hover:bg-primary-container/10 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">lock</span>
</button>
</nav>
<main class="mt-16 px-margin-mobile space-y-6 pt-4">
<!-- Patient Summary Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex items-center justify-between shadow-sm">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-primary-fixed">
<img class="w-full h-full object-cover" data-alt="A professional portrait of a smiling African woman with short hair, wearing a soft teal blouse. She is positioned against a clean, warm-toned neutral background. The lighting is soft and studio-quality, conveying a sense of calm and therapeutic trust, aligned with the Suluhu professional brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6zUmYxCLhLlJJ6DGsWUVvUyKYLSXdU5yySKzylGpwZk9sxvs0buMPm7zF7KYNvMWpkti_eYu47FTi6jSU5ioFTI9CWwkTlmXTN_wV0GAS2dKzZIAoAjiIFILj1gXhEFQRkqfgMlWdR7_etIyh_e8xulIWJx5qAJioFNTQJAgUM4yfv0x__s7E5wUFVwLlyiLKDz51M0ANJFrrN5awNUlNWLIVagZ0DxwNtTtqO3ZDDnezQS7ysoF1HM-4tPy2V85gU-VCbael9Dg"/>
</div>
<div>
<h2 class="font-label-md text-on-background font-semibold">Mercy Wanjiku</h2>
<p class="font-label-sm text-outline">ID: SLH-882</p>
</div>
</div>
<div class="flex flex-col items-end">
<span class="px-3 py-1 bg-secondary-container text-on-secondary-container text-label-sm rounded-full font-medium">Active</span>
<p class="font-label-sm text-outline mt-1">Last: Oct 24, 2023</p>
</div>
</section>
<!-- Form Section -->
<form class="space-y-8" id="clinicalNoteForm" onsubmit="event.preventDefault()">
<!-- Note Type Selector -->
<div class="space-y-3">
<label class="font-label-md text-on-surface-variant px-1">Note Type</label>
<div class="flex bg-surface-soothing p-1 rounded-xl gap-1">
<button class="flex-1 py-3 px-2 rounded-lg text-label-sm font-medium transition-all duration-200 text-outline" onclick="toggleNoteType('progress', this)" type="button">Progress Note</button>
<button class="flex-1 py-3 px-2 rounded-lg text-label-sm font-medium transition-all duration-200 segmented-active" onclick="toggleNoteType('soap', this)" type="button">SOAP Note</button>
<button class="flex-1 py-3 px-2 rounded-lg text-label-sm font-medium transition-all duration-200 text-outline" onclick="toggleNoteType('assessment', this)" type="button">Assessment</button>
</div>
</div>
<!-- SOAP Content Areas -->
<div class="space-y-6 animate-fade-in" id="soap-sections">
<!-- Subjective -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-1 flex items-center gap-2">
                        Subjective
                        <span class="material-symbols-outlined text-sm text-outline">info</span>
</label>
<textarea class="w-full min-h-[120px] bg-surface-soothing border-none rounded-xl p-4 focus:ring-2 focus:ring-on-primary-fixed-variant transition-all text-body-md placeholder:text-outline-variant" placeholder="Patient-reported symptoms and mood..."></textarea>
</div>
<!-- Objective -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-1 flex items-center gap-2">
                        Objective
                    </label>
<textarea class="w-full min-h-[120px] bg-surface-soothing border-none rounded-xl p-4 focus:ring-2 focus:ring-on-primary-fixed-variant transition-all text-body-md placeholder:text-outline-variant" placeholder="Clinician observations and mental status exam..."></textarea>
</div>
<!-- Assessment -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-1 flex items-center gap-2">
                        Assessment
                    </label>
<textarea class="w-full min-h-[120px] bg-surface-soothing border-none rounded-xl p-4 focus:ring-2 focus:ring-on-primary-fixed-variant transition-all text-body-md placeholder:text-outline-variant" placeholder="Clinical formulation and progress..."></textarea>
</div>
<!-- Plan -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-1 flex items-center gap-2">
                        Plan
                    </label>
<textarea class="w-full min-h-[120px] bg-surface-soothing border-none rounded-xl p-4 focus:ring-2 focus:ring-on-primary-fixed-variant transition-all text-body-md placeholder:text-outline-variant" placeholder="Next steps and home assignments..."></textarea>
</div>
</div>
<!-- Billing Code Search -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant px-1">Billing Code (ICD-10)</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full bg-surface-soothing border-none rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-on-primary-fixed-variant transition-all text-body-md placeholder:text-outline-variant" placeholder="Search codes (e.g. F41.1)..." type="text" value="F41.1 - Generalized anxiety disorder"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-1">
<span class="px-2 py-0.5 bg-accent-teal-light text-on-secondary-container text-[10px] font-bold rounded uppercase tracking-wider">Verified</span>
</div>
</div>
</div>
<!-- Sticky Actions -->
<div class="fixed bottom-20 left-0 w-full px-margin-mobile space-y-3 pb-4 pointer-events-none">
<div class="pointer-events-auto flex flex-col gap-3">
<button class="w-full bg-primary-container text-white py-4 rounded-xl font-semibold shadow-lg active:opacity-80 transition-opacity duration-200">
                        Save &amp; Finalize Note
                    </button>
<button class="w-full bg-surface-container-lowest border border-primary-container text-primary-container py-4 rounded-xl font-semibold active:bg-primary-container/5 transition-colors duration-200">
                        Save as Draft
                    </button>
</div>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-surface dark:bg-surface-dim border-t border-outline-variant dark:border-outline shadow-sm rounded-t-xl">
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl p-2 cursor-pointer transition-all">
<span class="material-symbols-outlined">description</span>
<span class="font-label-sm text-label-sm mt-1">Notes</span>
</div>
<div class="flex flex-col items-center justify-center text-outline dark:text-outline-variant p-2 cursor-pointer hover:text-primary transition-all">
<span class="material-symbols-outlined">groups</span>
<span class="font-label-sm text-label-sm mt-1">Patients</span>
</div>
<div class="flex flex-col items-center justify-center text-outline dark:text-outline-variant p-2 cursor-pointer hover:text-primary transition-all">
<span class="material-symbols-outlined">calendar_today</span>
<span class="font-label-sm text-label-sm mt-1">Calendar</span>
</div>
<div class="flex flex-col items-center justify-center text-outline dark:text-outline-variant p-2 cursor-pointer hover:text-primary transition-all">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm mt-1">Settings</span>
</div>
</nav>
<script>
        function toggleNoteType(type, element) {
            // Update buttons
            const buttons = element.parentElement.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.classList.remove('segmented-active');
                btn.classList.remove('text-on-primary');
                btn.classList.add('text-outline');
            });
            element.classList.add('segmented-active');
            element.classList.remove('text-outline');

            // Handle section visibility (mock logic)
            const soapSections = document.getElementById('soap-sections');
            if (type === 'soap') {
                soapSections.style.opacity = '1';
                soapSections.style.pointerEvents = 'auto';
            } else {
                // In a real app we might hide/show different sets of fields
                soapSections.style.opacity = '0.5';
            }
        }

        // Simple observer to ensure the sticky buttons don't overlap too much content
        // on very small screens, though standard padding-bottom should handle it.
    </script>
</body></html>
